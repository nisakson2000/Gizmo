name: Sync wiki to GitHub Wiki

on:
  push:
    branches: [main]
    paths: ['.github/wiki/**']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy and rename files
        shell: bash
        run: |
          declare -A MAP=(
            ["Home.md"]="Home.md"
            ["home.md"]="Home.md"
            ["architecture.md"]="Architecture.md"
            ["usage.md"]="Usage.md"
            ["setup.md"]="Setup.md"
            ["development.md"]="Development.md"
            ["model-reference.md"]="Model-Reference.md"
            ["how-ai-works.md"]="How-the-AI-Works.md"
            ["_Sidebar.md"]="_Sidebar.md"
          )

          for src in .github/wiki/*.md; do
            filename="$(basename "$src")"
            dest="${MAP[$filename]:-}"
            if [ -n "$dest" ]; then
              cp "$src" "wiki-repo/$dest"
              echo "Copied $filename → $dest"
            else
              echo "::warning::Skipping unmapped file: $filename"
            fi
          done

      - name: Push if changed
        run: |
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to sync"
          else
            git commit -m "docs: sync wiki from .github/wiki/ (auto)"
            git push
          fi
